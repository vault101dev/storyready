<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryReady — AI-Powered Interview Story Coach</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F1C2E; --navy-mid: #162236; --navy-light: #1E3050;
      --teal: #00C4B4; --teal-dim: rgba(0,196,180,0.12); --teal-glow: rgba(0,196,180,0.25);
      --amber: #F59E0B; --amber-dim: rgba(245,158,11,0.12);
      --red: #EF4444; --red-dim: rgba(239,68,68,0.12);
      --warm-white: #F7F5F1; --text-primary: #F7F5F1;
      --text-secondary: #94A3B8; --text-muted: #64748B;
      --border: rgba(255,255,255,0.07); --border-light: rgba(255,255,255,0.12);
      --radius: 12px; --radius-sm: 8px; --radius-lg: 16px;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── LANDING ── */
    .landing { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,196,180,0.08) 0%, transparent 70%), linear-gradient(180deg, #0F1C2E 0%, #0A1520 100%); }
    .landing-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--teal-dim); border: 1px solid rgba(0,196,180,0.3);
      border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--teal); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 28px; }
    .landing-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }
    .landing h1 { font-size: clamp(36px,6vw,64px); font-weight: 700; text-align: center; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 16px; max-width: 700px; }
    .landing h1 span { background: linear-gradient(135deg, var(--teal) 0%, #5EEAD4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .landing-sub { font-size: clamp(16px,2vw,19px); color: var(--text-secondary); text-align: center; max-width: 520px; line-height: 1.6; margin-bottom: 48px; }
    .landing-features { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; max-width: 860px; width: 100%; margin-bottom: 48px; }
    .feature-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .feature-icon { font-size: 24px; margin-bottom: 10px; }
    .feature-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .feature-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .landing-ctas { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .landing-portfolio-count { font-size: 12px; color: var(--teal); margin-top: 16px; opacity: 0.8; }

    /* ── BUTTONS ── */
    .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: var(--teal); color: var(--navy); font-size: 15px; font-weight: 600;
      padding: 14px 32px; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.2s; letter-spacing: -0.01em; }
    .btn-primary:hover { background: #00D4C4; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,196,180,0.3); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 500;
      padding: 13px 24px; border-radius: var(--radius); border: 1px solid var(--border-light); cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 500;
      padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; font-family: 'Inter',sans-serif; }
    .btn-ghost:hover { color: var(--text-primary); border-color: var(--border-light); background: rgba(255,255,255,0.04); }
    .btn-danger { display: inline-flex; align-items: center; gap: 6px; background: var(--red-dim); color: #F87171; font-size: 12px; font-weight: 500;
      padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid rgba(239,68,68,0.25); cursor: pointer; transition: all 0.2s; font-family: 'Inter',sans-serif; }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-teal { display: inline-flex; align-items: center; gap: 6px; background: var(--teal-dim); color: var(--teal); font-size: 12px; font-weight: 500;
      padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid rgba(0,196,180,0.3); cursor: pointer; transition: all 0.2s; font-family: 'Inter',sans-serif; }
    .btn-teal:hover { background: rgba(0,196,180,0.2); }
    .btn-teal:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-teal:disabled:hover { background: var(--teal-dim); }

    .download-menu-wrap { position: relative; display: inline-block; }
    .download-menu { position: absolute; top: calc(100% + 6px); right: 0; background: var(--navy-mid); border: 1px solid var(--border-light);
      border-radius: var(--radius-sm); padding: 5px; min-width: 170px; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: fadeUp 0.15s ease; }
    .download-menu-item { display: flex; align-items: center; gap: 9px; width: 100%; background: transparent; border: none; border-radius: 6px;
      padding: 8px 10px; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; text-align: left; font-family: 'Inter',sans-serif; transition: all 0.12s; }
    .download-menu-item:hover { background: rgba(0,196,180,0.1); color: var(--text-primary); }
    .download-menu-section-label { font-size: 9.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 10px 3px; }
    .download-menu-divider { height: 1px; background: var(--border); margin: 4px 2px; }

    /* ── PROGRESS ── */
    .progress-bar { height: 2px; background: var(--border); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal), #5EEAD4); transition: width 0.5s ease; }

    /* ── APP LAYOUT ── */
    .app-layout { display: grid; grid-template-columns: 1fr 1fr; flex: 1; }

    /* ── CHAT PANEL ── */
    .chat-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--navy); min-height: 0; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--navy-mid); flex-shrink: 0; }
    .chat-header-left { display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 30px; height: 30px; background: var(--teal); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--navy); }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
    .logo-text span { color: var(--teal); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .step-pill { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px;
      background: var(--navy-light); color: var(--text-muted); border: 1px solid var(--border); }
    .step-pill.active { background: var(--teal-dim); color: var(--teal); border-color: rgba(0,196,180,0.3); }
    .step-pill.done { background: rgba(16,185,129,0.1); color: #34D399; border-color: rgba(16,185,129,0.3); }
    .cost-pill { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,196,180,0.3); }

    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; min-height: 0; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-avatar { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar.ai { background: var(--teal); color: var(--navy); }
    .msg-avatar.user { background: var(--navy-light); color: var(--text-primary); border: 1px solid var(--border-light); }
    .msg-bubble { flex: 1; font-size: 13.5px; line-height: 1.65; color: var(--text-primary); }
    .msg-bubble.ai { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; padding: 11px 14px; }
    .msg-bubble.user { background: var(--teal-dim); border: 1px solid rgba(0,196,180,0.2); border-radius: 12px 4px 12px 12px; padding: 11px 14px; color: var(--warm-white); }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,60%,100% { opacity:0.3; transform:translateY(0); } 30% { opacity:1; transform:translateY(-3px); } }

    .question-grid { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
    .question-btn { background: var(--navy-light); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 9px 14px;
      text-align: left; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-family: 'Inter',sans-serif; line-height: 1.4;
      display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .question-btn:hover { background: var(--teal-dim); border-color: rgba(0,196,180,0.3); color: var(--text-primary); }
    .question-btn.selected { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
    .question-btn.has-progress { border-color: rgba(0,196,180,0.25); }
    .question-btn-text { flex: 1; }
    .question-status-badge { font-size: 9.5px; font-weight: 700; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; letter-spacing: 0.02em; }
    .status-in-progress { background: rgba(245,158,11,0.15); color: #FCD34D; }
    .status-completed { background: rgba(16,185,129,0.15); color: #34D399; }
    .custom-sessions-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

    .chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--navy-mid); flex-shrink: 0; }
    .retry-banner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 20px;
      background: var(--amber-dim); border-top: 1px solid rgba(245,158,11,0.25); border-bottom: 1px solid rgba(245,158,11,0.25);
      font-size: 12.5px; color: #FCD34D; flex-shrink: 0; animation: fadeUp 0.3s ease; }
    .chat-input-wrap { display: flex; gap: 10px; align-items: flex-end; }
    .chat-textarea { flex: 1; background: var(--navy-light); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 10px 14px;
      font-size: 13.5px; font-family: 'Inter',sans-serif; color: var(--text-primary); resize: none; min-height: 44px; max-height: 140px; line-height: 1.5; transition: border-color 0.2s; }
    .chat-textarea:focus { outline: none; border-color: var(--teal); }
    .chat-textarea::placeholder { color: var(--text-muted); }
    .chat-textarea:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn { width: 40px; height: 40px; background: var(--teal); border: none; border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; color: var(--navy); font-size: 16px; }
    .send-btn:hover { background: #00D4C4; transform: scale(1.05); }
    .send-btn:disabled { background: var(--navy-light); color: var(--text-muted); cursor: not-allowed; transform: none; }
    .chat-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }

    /* ── OUTPUT PANEL ── */
    .output-panel { display: flex; flex-direction: column; background: var(--navy-mid); min-height: 0; }
    .output-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--navy); flex-shrink: 0; }
    .output-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .output-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .output-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .output-content { flex: 1; overflow-y: auto; padding: 18px; min-height: 0; }
    .usage-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; background: rgba(0,196,180,0.04); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .usage-chip { font-size: 11px; font-weight: 500; color: var(--text-secondary); background: var(--navy); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
    .usage-chip-cost { color: var(--teal); border-color: rgba(0,196,180,0.25); }
    .usage-model-label { font-size: 10px; color: var(--text-muted); margin-left: auto; }
    .output-content::-webkit-scrollbar { width: 4px; }
    .output-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; gap: 12px; }
    .empty-icon { width: 56px; height: 56px; background: var(--navy-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 4px; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .empty-desc { font-size: 13px; color: var(--text-secondary); max-width: 260px; line-height: 1.55; }

    /* ── OUTPUT SECTIONS ── */
    .output-section { margin-bottom: 18px; animation: fadeUp 0.4s ease; }
    .output-tabs-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .output-tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 8px 4px; margin-right: 16px;
      font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: 'Inter',sans-serif; }
    .output-tab-btn:hover { color: var(--text-secondary); }
    .output-tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }
    .output-tab-panel { animation: fadeUp 0.25s ease; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .section-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .badge-star { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,196,180,0.2); }
    .badge-lp { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .badge-fq { background: rgba(139,92,246,0.12); color: #A78BFA; border: 1px solid rgba(139,92,246,0.2); }
    .badge-qm { background: rgba(236,72,153,0.1); color: #F472B6; border: 1px solid rgba(236,72,153,0.2); }

    .refined-box { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12.5px; color: var(--text-secondary); line-height: 1.7; white-space: pre-wrap; }

    .star-cards { display: flex; flex-direction: column; gap: 7px; }
    .star-card { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .star-card-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .star-letter { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .star-s { background: rgba(59,130,246,0.15); color: #60A5FA; }
    .star-t { background: rgba(16,185,129,0.15); color: #34D399; }
    .star-a { background: rgba(245,158,11,0.15); color: #FCD34D; }
    .star-r { background: rgba(239,68,68,0.15); color: #F87171; }
    .star-card-label { font-size: 12px; font-weight: 600; color: var(--text-primary); }
    .star-card-sublabel { font-size: 10px; color: var(--text-muted); margin-left: auto; text-transform: uppercase; letter-spacing: 0.04em; }
    .star-card-body { padding: 10px 12px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }

    .lp-grid { display: flex; flex-direction: column; gap: 6px; }
    .lp-item { display: flex; align-items: flex-start; gap: 10px; background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
    .lp-icon-wrap { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .lp-content { flex: 1; }
    .lp-name { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .lp-proof { font-size: 11.5px; color: var(--text-secondary); line-height: 1.5; }
    .strength-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
    .strength-strong { background: rgba(16,185,129,0.12); color: #34D399; }
    .strength-moderate { background: rgba(59,130,246,0.12); color: #60A5FA; }

    .fq-list { display: flex; flex-direction: column; gap: 6px; }
    .fq-item { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; gap: 10px; }
    .fq-num { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 18px; margin-top: 1px; }
    .fq-content { flex: 1; }
    .fq-q { font-size: 12.5px; color: var(--text-primary); margin-bottom: 4px; line-height: 1.45; font-weight: 500; }
    .fq-why { font-size: 11.5px; color: var(--text-secondary); line-height: 1.5; }
    .fq-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; align-self: flex-start; }
    .tag-probe { background: rgba(239,68,68,0.1); color: #F87171; }
    .tag-depth { background: rgba(245,158,11,0.1); color: #FCD34D; }
    .tag-judgment { background: rgba(139,92,246,0.1); color: #A78BFA; }
    .tag-scale { background: rgba(59,130,246,0.1); color: #60A5FA; }
    .tag-collab { background: rgba(16,185,129,0.1); color: #34D399; }

    .qm-list { display: flex; flex-direction: column; gap: 6px; }
    .qm-item { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; gap: 10px; }
    .qm-fit { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; align-self: flex-start; }
    .fit-strong { background: rgba(16,185,129,0.12); color: #34D399; }
    .fit-good { background: rgba(59,130,246,0.12); color: #60A5FA; }
    .fit-pivot { background: rgba(245,158,11,0.12); color: #FCD34D; }

    /* ── PORTFOLIO SCREEN ── */
    .portfolio-screen { min-height: 100vh; display: flex; flex-direction: column; background: var(--navy); }
    .portfolio-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--navy-mid); flex-shrink: 0; }
    .portfolio-header-left { display: flex; align-items: center; gap: 16px; }
    .portfolio-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .portfolio-count { font-size: 12px; color: var(--text-muted); }
    .portfolio-total-cost { display: flex; flex-direction: column; align-items: flex-end; background: var(--teal-dim); border: 1px solid rgba(0,196,180,0.3);
      border-radius: var(--radius-sm); padding: 6px 14px; }
    .portfolio-total-cost-label { font-size: 9.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .portfolio-total-cost-value { font-size: 14px; font-weight: 700; color: var(--teal); }
    .portfolio-content { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .portfolio-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; gap: 12px; }
    .portfolio-grid { display: flex; flex-direction: column; gap: 16px; }

// ── JSON REPAIR ────────────────────────────────────────────────────────────────
// Best-effort recovery if a response got cut off mid-JSON (e.g. hit token limit).
// Closes any unterminated string and balances brackets so JSON.parse can succeed,
// even if it means dropping the last incomplete item.
function tryRepairJson(raw) {
  let str = raw.trim().replace(/```json|```/g, '').trim();
  // If there's an odd number of unescaped quotes, the last string is unterminated — close it.
  const quoteMatches = str.match(/(?<!\\)"/g) || [];
  if (quoteMatches.length % 2 !== 0) str += '"';
  // Trim back to the last fully-closed object/array element to drop any dangling partial entry.
  const lastGoodCloseBrace = Math.max(str.lastIndexOf('},'), str.lastIndexOf('}\n'), str.lastIndexOf('} '));
  // Balance brackets/braces by appending whatever is missing.
  const opens = { '{': 0, '[': 0 };
  let inString = false, escape = false;
  for (const ch of str) {
    if (escape) { escape = false; continue; }
    if (ch === '\\') { escape = true; continue; }
    if (ch === '"') { inString = !inString; continue; }
    if (inString) continue;
    if (ch === '{') opens['{']++;
    else if (ch === '}') opens['{']--;
    else if (ch === '[') opens['[']++;
    else if (ch === ']') opens['[']--;
  }
  // Strip trailing comma before we close things out
  str = str.replace(/,\s*$/, '');
  str += ']'.repeat(Math.max(0, opens['['])) ;
  str += '}'.repeat(Math.max(0, opens['{']));
  return JSON.parse(str);
}

// ── API ────────────────────────────────────────────────────────────────────────
async function callClaude(messages, systemPrompt, apiKey, maxTokens, model) {
  if (!apiKey) throw new Error('NO_API_KEY');
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: model || DEFAULT_MODEL, max_tokens: maxTokens || 1000, system: systemPrompt, messages }),
  });
  const data = await response.json();
  if (data.error) {
    if (data.error.type === 'authentication_error') throw new Error('INVALID_API_KEY');
    throw new Error(data.error.message);
  }
  if (data.stop_reason === 'max_tokens') {
    throw new Error('TRUNCATED_RESPONSE');
  }
  return { text: data.content[0].text, usage: data.usage || null };
}

function estimateCost(usage, model) {
  if (!usage) return 0;
  const pricing = MODEL_PRICING[model || DEFAULT_MODEL] || MODEL_PRICING[DEFAULT_MODEL];
  const inputCost = (usage.input_tokens / 1_000_000) * pricing.input;
  const outputCost = (usage.output_tokens / 1_000_000) * pricing.output;
  return inputCost + outputCost;
}

function formatCost(cost) {
  if (cost < 0.01) return '< $0.01';
  return `$${cost.toFixed(2)}`;
}

const REFINE_PROMPT = `You are a world-class FAANG interview coach specializing in TPM behavioral interviews.
Given a question and a raw story, return ONLY valid JSON:
{
  "refinedResponse": "Polished 3-5 paragraph story, no bullet points. CRITICAL: separate each paragraph with a literal double newline (\\n\\n) inside the JSON string — this is required for proper formatting in downloads. Do not return the story as one unbroken block of text.",
  "star": { "situation": "2-4 sentences", "task": "2-3 sentences", "action": "3-5 sentences. If it naturally spans more than one idea, separate with \\n\\n.", "result": "2-4 sentences with metrics" },
  "leadershipPrinciples": [{ "name": "LP name", "proof": "1-2 sentences", "strength": "Strong or Moderate" }],
  "followUpQuestions": [{ "question": "Follow-up question", "why": "Why they'd ask this", "tag": "Probe or Depth or Judgment or Scale or Collaboration" }],
  "questionMapping": [{ "question": "Other question this story answers", "why": "Why it fits", "fit": "Strong fit or Good fit or Pivot needed", "pivotTip": "Optional reframe tip" }]
}
Include 4-6 LPs, 6-8 follow-ups, 6-9 question mappings. Return ONLY the JSON object.`;

const CHAT_PROMPT = `You are StoryReady, a friendly FAANG interview coach. Help job seekers craft STAR-format behavioral stories.
Ask ONE specific follow-up question per turn to strengthen their story. Focus on: specific metrics, who pushed back, what the stakes were, what specifically changed, lasting impact.
When you have enough detail (after 1-3 exchanges), say exactly: READY_TO_PROCESS
Keep responses SHORT — 2-4 sentences max. Be direct and specific.`;

// ── TEXT GENERATION ────────────────────────────────────────────────────────────
// Splits a block of text into paragraphs. Prefers explicit \n\n breaks (what we now
// instruct the model to produce). Falls back to splitting on single \n, and if the
// text is still one giant unbroken block, makes a best-effort split on sentence
// boundaries every ~3 sentences so downloads are never one wall of text.
function splitIntoParagraphs(text) {
  if (!text) return [''];
  const normalized = text.replace(/\r\n/g, '\n').trim();
  let paras = normalized.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  if (paras.length > 1) return paras;

  paras = normalized.split(/\n+/).map(p => p.trim()).filter(Boolean);
  if (paras.length > 1) return paras;

  // Defensive fallback: no breaks at all — group sentences into ~3-sentence paragraphs.
  const sentences = normalized.match(/[^.!?]+[.!?]+(\s+|$)/g);
  if (!sentences || sentences.length <= 3) return [normalized];
  const grouped = [];
  for (let i = 0; i < sentences.length; i += 3) {
    grouped.push(sentences.slice(i, i + 3).join('').trim());
  }
  return grouped.filter(Boolean);
}

function generateStoryText(question, output, index) {
  const lines = [];
  if (index !== undefined) { lines.push(`STORY ${index + 1}`); lines.push('═'.repeat(60)); }
  lines.push(`QUESTION: ${question}`);
  lines.push('');
  lines.push('REFINED RESPONSE');
  lines.push('─'.repeat(40));
  splitIntoParagraphs(output.refinedResponse).forEach(p => { lines.push(p); lines.push(''); });
  lines.push('STAR FORMAT');
  lines.push('─'.repeat(40));
  if (output.star) {
    ['situation','task','action','result'].forEach(k => {
      lines.push(k.toUpperCase() + ':');
      splitIntoParagraphs(output.star[k]).forEach(p => lines.push(p));
      lines.push('');
    });
  }
  lines.push('LEADERSHIP PRINCIPLES');
  lines.push('─'.repeat(40));
  (output.leadershipPrinciples || []).forEach((lp,i) => {
    lines.push(`${i+1}. ${lp.name} [${lp.strength}]`);
    lines.push(`   ${lp.proof}`);
    lines.push('');
  });
  lines.push('LIKELY FOLLOW-UP QUESTIONS');
  lines.push('─'.repeat(40));
  (output.followUpQuestions || []).forEach((fq,i) => {
    lines.push(`${i+1}. [${fq.tag}] ${fq.question}`);
    lines.push(`   → ${fq.why}`);
    lines.push('');
  });
  lines.push('OTHER QUESTIONS THIS STORY ANSWERS');
  lines.push('─'.repeat(40));
  (output.questionMapping || []).forEach((qm,i) => {
    lines.push(`${i+1}. [${qm.fit}] ${qm.question}`);
    lines.push(`   → ${qm.why}`);
    if (qm.pivotTip) lines.push(`   Tip: ${qm.pivotTip}`);
    lines.push('');
  });
  return lines.join('\n');
}

function downloadText(content, filename) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function downloadBlob(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();

}

// ── CSV GENERATION ──────────────────────────────────────────────────────────────
function csvEscape(val) {
  if (val === null || val === undefined) return '';
  const str = String(val).replace(/"/g, '""');
  return `"${str}"`;
}

// Joins paragraph-split text back together with real newlines for cell display.
// Quoted CSV/XLSX cells are allowed to contain literal \n — spreadsheet apps render
// it as wrapped multi-line text within that single cell, which is what we want.
function cellText(text) {
  return splitIntoParagraphs(text).join('\n');
}

function generateStoryCsv(entries) {
  // One row per story, columns for every major field — easy to open in Sheets/Excel.
  const headers = ['Story #', 'Question', 'Refined Response', 'Situation', 'Task', 'Action', 'Result',
    'Leadership Principles (Strong)', 'Leadership Principles (Moderate)',
    'Follow-Up Questions', 'Other Questions This Story Answers', 'Date Saved', 'Cost'];
  const rows = [headers.map(csvEscape).join(',')];

  entries.forEach((entry, i) => {
    const { question, output, savedAt, cost } = entry;
    const star = output.star || {};
    const strongLPs = (output.leadershipPrinciples || []).filter(lp => lp.strength === 'Strong').map(lp => lp.name).join('; ');
    const moderateLPs = (output.leadershipPrinciples || []).filter(lp => lp.strength === 'Moderate').map(lp => lp.name).join('; ');
    const followUps = (output.followUpQuestions || []).map(fq => `[${fq.tag}] ${fq.question}`).join('\n');
    const otherQs = (output.questionMapping || []).map(qm => `[${qm.fit}] ${qm.question}`).join('\n');
    const dateStr = savedAt ? new Date(savedAt).toLocaleDateString('en-US') : '';
    const costStr = cost !== undefined ? formatCost(cost) : '';

    rows.push([
      i + 1, question, cellText(output.refinedResponse),
      cellText(star.situation), cellText(star.task), cellText(star.action), cellText(star.result),
      strongLPs, moderateLPs, followUps, otherQs, dateStr, costStr
    ].map(csvEscape).join(','));
  });

  return rows.join('\n');
}

// ── WORD (.docx) GENERATION ───────────────────────────────────────────────────
// Builds a real, valid .docx (WordprocessingML) file entirely client-side —
// no server, no npm packages. Word, Google Docs, and LibreOffice all open this natively.
function escapeXml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function docxHeading(text, level) {
  const sz = level === 1 ? 32 : level === 2 ? 26 : 22;
  return `<w:p><w:pPr><w:spacing w:before="240" w:after="120"/><w:outlineLvl w:val="${level-1}"/></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="${sz}"/><w:color w:val="0F1C2E"/></w:rPr><w:t xml:space="preserve">${escapeXml(text)}</w:t></w:r></w:p>`;
}

function docxParagraph(text, opts) {
  opts = opts || {};
  const bold = opts.bold ? '<w:b/>' : '';
  const italic = opts.italic ? '<w:i/>' : '';
  const color = opts.color ? `<w:color w:val="${opts.color}"/>` : '';
  const sz = opts.size ? `<w:sz w:val="${opts.size}"/>` : '';
  const spacing = opts.spacingAfter !== undefined ? opts.spacingAfter : 160;
  return `<w:p><w:pPr><w:spacing w:after="${spacing}"/></w:pPr>
    <w:r><w:rPr>${bold}${italic}${color}${sz}</w:rPr><w:t xml:space="preserve">${escapeXml(text || '')}</w:t></w:r></w:p>`;
}

// Splits text into paragraphs and emits one real <w:p> per paragraph, so Word shows
// genuine paragraph breaks (literal \n inside a single <w:t> is invisible in Word —
// it must be separate paragraph elements, which is what this produces).
function docxParagraphs(text, opts) {
  const paras = splitIntoParagraphs(text);
  return paras.map(p => docxParagraph(p, opts)).join('');
}

function docxDivider() {
  return `<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="CCCCCC"/></w:pBdr><w:spacing w:after="200"/></w:pPr></w:p>`;
}

function generateStoryDocxXml(entries) {
  let body = '';
  body += docxHeading('StoryReady — Interview Story Portfolio', 1);
  body += docxParagraph(`Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · ${entries.length} ${entries.length===1?'story':'stories'}`, { italic: true, color: '64748B', size: 20 });
  body += docxDivider();

  entries.forEach((entry, i) => {
    const { question, output } = entry;
    const star = output.star || {};

    if (entries.length > 1) body += docxHeading(`Story ${i + 1}`, 1);
    body += docxParagraph(`Question: ${question}`, { bold: true, size: 24 });
    body += docxParagraph('');

    body += docxHeading('Refined Response', 2);
    body += docxParagraphs(output.refinedResponse || '');

    body += docxHeading('STAR Format', 2);
    [['Situation', star.situation], ['Task', star.task], ['Action', star.action], ['Result', star.result]].forEach(([label, text]) => {
      body += docxParagraph(label + ':', { bold: true, spacingAfter: 40 });
      body += docxParagraphs(text || '');
    });

    body += docxHeading('Leadership Principles', 2);
    (output.leadershipPrinciples || []).forEach(lp => {
      body += docxParagraph(`${lp.name} [${lp.strength}]`, { bold: true, spacingAfter: 40 });
      body += docxParagraph(lp.proof || '');
    });

    body += docxHeading('Likely Follow-Up Questions', 2);
    (output.followUpQuestions || []).forEach((fq, idx) => {
      body += docxParagraph(`${idx+1}. [${fq.tag}] ${fq.question}`, { bold: true, spacingAfter: 40 });
      body += docxParagraph(fq.why || '');
    });

    body += docxHeading('Other Questions This Story Answers', 2);
    (output.questionMapping || []).forEach((qm, idx) => {
      body += docxParagraph(`${idx+1}. [${qm.fit}] ${qm.question}`, { bold: true, spacingAfter: 40 });
      body += docxParagraph(qm.why || '');
      if (qm.pivotTip) body += docxParagraph(`Tip: ${qm.pivotTip}`, { italic: true, color: '854F0B' });
    });

    if (i < entries.length - 1) body += docxDivider();
  });

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    ${body}
    <w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/></w:sectPr>
  </w:body>
</w:document>`;
}

// Minimal valid DOCX = a ZIP with a few required XML parts. We build the ZIP by hand
// (no library) using the browser's built-in CompressionStream where available, falling
// back to an uncompressed (store-mode) ZIP, which Word/Google Docs/LibreOffice all accept.
async function buildDocxBlob(documentXml) {
  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

  const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const files = [
    { name: '[Content_Types].xml', content: contentTypes },
    { name: '_rels/.rels', content: rels },
    { name: 'word/document.xml', content: documentXml },
  ];

  const zipBytes = buildZip(files);
  return new Blob([zipBytes], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}

// Tiny, dependency-free ZIP writer (STORE method = no compression, which is valid ZIP
// and fully supported by every Office/Docs reader — avoids needing a compression library).
function buildZip(files) {
  const encoder = new TextEncoder();
  const fileRecords = [];
  const centralRecords = [];
  let offset = 0;

  function crc32(bytes) {
    let crc = ~0;
    for (let i = 0; i < bytes.length; i++) {
      crc ^= bytes[i];
      for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
    }
    return ~crc >>> 0;
  }

  function writeUint32LE(arr, val) { arr.push(val & 0xFF, (val>>>8) & 0xFF, (val>>>16) & 0xFF, (val>>>24) & 0xFF); }
  function writeUint16LE(arr, val) { arr.push(val & 0xFF, (val>>>8) & 0xFF); }

  files.forEach(f => {
    const nameBytes = encoder.encode(f.name);
    const dataBytes = encoder.encode(f.content);
    const crc = crc32(dataBytes);

    const local = [];
    writeUint32LE(local, 0x04034b50); // local file header signature
    writeUint16LE(local, 20); // version needed
    writeUint16LE(local, 0); // flags
    writeUint16LE(local, 0); // compression = store
    writeUint16LE(local, 0); // mod time
    writeUint16LE(local, 0); // mod date
    writeUint32LE(local, crc);
    writeUint32LE(local, dataBytes.length); // compressed size
    writeUint32LE(local, dataBytes.length); // uncompressed size
    writeUint16LE(local, nameBytes.length);
    writeUint16LE(local, 0); // extra field length
    const localHeader = new Uint8Array(local);
    const localRecord = new Uint8Array(localHeader.length + nameBytes.length + dataBytes.length);
    localRecord.set(localHeader, 0);
    localRecord.set(nameBytes, localHeader.length);
    localRecord.set(dataBytes, localHeader.length + nameBytes.length);
    fileRecords.push(localRecord);

    const central = [];
    writeUint32LE(central, 0x02014b50); // central directory signature
    writeUint16LE(central, 20); // version made by
    writeUint16LE(central, 20); // version needed
    writeUint16LE(central, 0); // flags
    writeUint16LE(central, 0); // compression
    writeUint16LE(central, 0); // mod time
    writeUint16LE(central, 0); // mod date
    writeUint32LE(central, crc);
    writeUint32LE(central, dataBytes.length);
    writeUint32LE(central, dataBytes.length);
    writeUint16LE(central, nameBytes.length);
    writeUint16LE(central, 0); // extra length
    writeUint16LE(central, 0); // comment length
    writeUint16LE(central, 0); // disk number
    writeUint16LE(central, 0); // internal attrs
    writeUint32LE(central, 0); // external attrs
    writeUint32LE(central, offset); // local header offset
    const centralHeader = new Uint8Array(central);
    const centralRecord = new Uint8Array(centralHeader.length + nameBytes.length);
    centralRecord.set(centralHeader, 0);
    centralRecord.set(nameBytes, centralHeader.length);
    centralRecords.push(centralRecord);

    offset += localRecord.length;
  });

  const centralStart = offset;
  let centralSize = 0;
  centralRecords.forEach(r => { centralSize += r.length; });

  const end = [];
  writeUint32LE(end, 0x06054b50); // end of central directory signature
  writeUint16LE(end, 0); // disk number
  writeUint16LE(end, 0); // disk with central dir
  writeUint16LE(end, files.length); // entries on this disk
  writeUint16LE(end, files.length); // total entries
  writeUint32LE(end, centralSize);
  writeUint32LE(end, centralStart);
  writeUint16LE(end, 0); // comment length
  const endRecord = new Uint8Array(end);

  const totalSize = offset + centralSize + endRecord.length;
  const zipBytes = new Uint8Array(totalSize);
  let pos = 0;
  fileRecords.forEach(r => { zipBytes.set(r, pos); pos += r.length; });
  centralRecords.forEach(r => { zipBytes.set(r, pos); pos += r.length; });
  zipBytes.set(endRecord, pos);

  return zipBytes;
}

async function downloadDocx(entries, filename) {
  const xml = generateStoryDocxXml(entries);
  const blob = await buildDocxBlob(xml);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── EXCEL (.xlsx) GENERATION ──────────────────────────────────────────────────
// Builds a real, valid .xlsx (SpreadsheetML) file entirely client-side — no server,
// no npm packages. Excel, Google Sheets, and LibreOffice Calc all open this natively.
// Reuses the same hand-rolled buildZip() used for .docx, since .xlsx is also just a ZIP of XML.
function xlsxColLetter(n) {
  // 0-indexed column number → Excel column letter (0 → A, 25 → Z, 26 → AA, ...)
  let s = '';
  n = n + 1;
  while (n > 0) {
    const rem = (n - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

function xlsxEscape(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\r\n/g, '\n'); // normalize line endings; XLSX inline strings handle \n fine
}

function buildSheetXml(rows, sharedStrings) {
  // rows: array of arrays (cell values, all strings for simplicity — readable & safe in Sheets/Excel/LibreOffice)
  const colCount = Math.max(...rows.map(r => r.length), 1);
  const colWidths = [];
  for (let c = 0; c < colCount; c++) {
    let maxLen = 10;
    rows.forEach(r => {
      const lines = r[c] ? String(r[c]).split('\n') : [''];
      const longestLine = Math.max(...lines.map(l => l.length));
      if (longestLine > maxLen) maxLen = Math.min(longestLine, 60);
    });
    colWidths.push(maxLen);
  }
  const colsXml = `<cols>${colWidths.map((w,i) => `<col min="${i+1}" max="${i+1}" width="${w+2}" customWidth="1"/>`).join('')}</cols>`;

  const rowsXml = rows.map((row, rIdx) => {
    // Row needs extra height if any cell in it wraps across multiple lines.
    const maxLinesInRow = Math.max(1, ...row.map(v => (v ? String(v).split('\n').length : 1)));
    const heightAttr = maxLinesInRow > 1 ? ` ht="${Math.min(maxLinesInRow * 15, 300)}" customHeight="1"` : '';

    const cellsXml = row.map((val, cIdx) => {
      const ref = `${xlsxColLetter(cIdx)}${rIdx + 1}`;
      const text = val === null || val === undefined ? '' : String(val);
      const idx = sharedStrings.add(text);
      // Style 1 = bold header row. Style 2 = wrap-text body cell (only applied when the cell actually has line breaks).
      let styleAttr = '';
      if (rIdx === 0) styleAttr = ' s="1"';
      else if (text.includes('\n')) styleAttr = ' s="2"';
      return `<c r="${ref}" t="s"${styleAttr}><v>${idx}</v></c>`;
    }).join('');
    return `<row r="${rIdx + 1}"${heightAttr}>${cellsXml}</row>`;
  }).join('');

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  ${colsXml}
  <sheetData>${rowsXml}</sheetData>
</worksheet>`;
}

function makeSharedStringsCollector() {
  const strings = [];
  const index = new Map();
  return {
    add(text) {
      if (index.has(text)) return index.get(text);
      const i = strings.length;
      strings.push(text);
      index.set(text, i);
      return i;
    },
    toXml() {
      const items = strings.map(s => `<si><t xml:space="preserve">${xlsxEscape(s)}</t></si>`).join('');
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${strings.length}" uniqueCount="${strings.length}">${items}</sst>`;
    }
  };
}

function generateStoryRows(entries) {
  const headers = ['Story #', 'Question', 'Refined Response', 'Situation', 'Task', 'Action', 'Result',
    'Leadership Principles (Strong)', 'Leadership Principles (Moderate)',
    'Follow-Up Questions', 'Other Questions This Story Answers', 'Date Saved', 'Cost'];
  const rows = [headers];

  entries.forEach((entry, i) => {
    const { question, output, savedAt, cost } = entry;
    const star = output.star || {};
    const strongLPs = (output.leadershipPrinciples || []).filter(lp => lp.strength === 'Strong').map(lp => lp.name).join('; ');
    const moderateLPs = (output.leadershipPrinciples || []).filter(lp => lp.strength === 'Moderate').map(lp => lp.name).join('; ');
    const followUps = (output.followUpQuestions || []).map(fq => `[${fq.tag}] ${fq.question}`).join('\n');
    const otherQs = (output.questionMapping || []).map(qm => `[${qm.fit}] ${qm.question}`).join('\n');
    const dateStr = savedAt ? new Date(savedAt).toLocaleDateString('en-US') : '';
    const costStr = cost !== undefined ? formatCost(cost) : '';

    rows.push([i + 1, question, cellText(output.refinedResponse), cellText(star.situation), cellText(star.task),
      cellText(star.action), cellText(star.result), strongLPs, moderateLPs, followUps, otherQs, dateStr, costStr]);
  });

  return rows;
}

async function buildXlsxBlob(rows) {
  const sharedStrings = makeSharedStringsCollector();
  const sheetXml = buildSheetXml(rows, sharedStrings);
  const sstXml = sharedStrings.toXml();

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
  <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
  <Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>
  <Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`;

  const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

  const workbookXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheets><sheet name="Stories" sheetId="1" r:id="rId1"/></sheets>
</workbook>`;

  const workbookRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>
  <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  // Minimal styles.xml: index 0 = default, index 1 = bold header row, index 2 = wrap-text body cell
  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <fonts count="2">
    <font><sz val="11"/><name val="Calibri"/></font>
    <font><b/><sz val="11"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
  </fonts>
  <fills count="3">
    <fill><patternFill patternType="none"/></fill>
    <fill><patternFill patternType="gray125"/></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF0F1C2E"/><bgColor indexed="64"/></patternFill></fill>
  </fills>
  <borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs count="3">
    <xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
    <xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"/>
    <xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0" applyAlignment="1"><alignment wrapText="1" vertical="top"/></xf>
  </cellXfs>
</styleSheet>`;

  const files = [
    { name: '[Content_Types].xml', content: contentTypes },
    { name: '_rels/.rels', content: rootRels },
    { name: 'xl/workbook.xml', content: workbookXml },
    { name: 'xl/_rels/workbook.xml.rels', content: workbookRels },
    { name: 'xl/worksheets/sheet1.xml', content: sheetXml },
    { name: 'xl/sharedStrings.xml', content: sstXml },
    { name: 'xl/styles.xml', content: stylesXml },
  ];

  const zipBytes = buildZip(files);
  return new Blob([zipBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
}

async function downloadXlsx(entries, filename) {
  const rows = generateStoryRows(entries);
  const blob = await buildXlsxBlob(rows);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── UNIFIED DOWNLOAD ROUTER ──────────────────────────────────────────────────────
// entries: array of { question, output, savedAt?, cost? } — single-story downloads
// pass a one-item array so all formats share the same code path.
// Grouped by category so the dropdown UI can render section headers.
const DOWNLOAD_FORMAT_GROUPS = [
  {
    label: 'Document',
    formats: {
      txt:   { label: 'Text (.txt)',   icon: '📄', ext: 'txt' },
      docx:  { label: 'Word (.docx)',  icon: '📝', ext: 'docx' },
      gdocs: { label: 'Google Docs',   icon: '📑', ext: 'docx' },
    },
  },
  {
    label: 'Spreadsheet',
    formats: {
      csv:     { label: 'CSV (.csv)',       icon: '📊', ext: 'csv' },
      xlsx:    { label: 'Excel (.xlsx)',     icon: '🟢', ext: 'xlsx' },
      gsheets: { label: 'Google Sheets',     icon: '📈', ext: 'xlsx' },
    },
  },
];
// Flattened lookup, derived from the groups above — used wherever we just need format metadata.
const DOWNLOAD_FORMATS = DOWNLOAD_FORMAT_GROUPS.reduce((acc, g) => ({ ...acc, ...g.formats }), {});

async function triggerDownload(format, entries, baseFilename) {
  if (!entries.length) return;
  const filename = `${baseFilename}.${DOWNLOAD_FORMATS[format].ext}`;

  if (format === 'txt') {
    const header = entries.length > 1
      ? ['STORYREADY — INTERVIEW STORY PORTFOLIO', `Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`, `${entries.length} stories`, '═'.repeat(60), ''].join('\n')
      : '';
    const body = entries.map((e,i) => generateStoryText(e.question, e.output, entries.length > 1 ? i : undefined)).join('\n\n' + '═'.repeat(60) + '\n\n');
    downloadText(header + body, filename);
  } else if (format === 'csv') {
    downloadBlob(generateStoryCsv(entries), filename, 'text/csv;charset=utf-8');
  } else if (format === 'docx' || format === 'gdocs') {
    await downloadDocx(entries, filename);
  } else if (format === 'xlsx' || format === 'gsheets') {
    await downloadXlsx(entries, filename);
  }
}

// ── DOWNLOAD MENU ──────────────────────────────────────────────────────────────
// A small dropdown attached to a "Download" trigger button, offering format choice.
// `getEntries` is a function so callers can compute the entry list lazily (e.g. selected items).
function DownloadMenu({ label, getEntries, baseFilename, buttonClass, disabled, onDownloaded }) {
  const [open, setOpen] = useState(false);
  const [cloudNote, setCloudNote] = useState(null); // 'gdocs' | 'gsheets' | null
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const handlePick = async (format) => {
    if (format === 'gdocs' || format === 'gsheets') { setOpen(false); setCloudNote(format); return; }
    setOpen(false);
    const entries = getEntries();
    await triggerDownload(format, entries, baseFilename);
    if (onDownloaded) onDownloaded(format, entries.length);
  };

  const confirmCloudDownload = async () => {
    const format = cloudNote;
    setCloudNote(null);
    const entries = getEntries();
    await triggerDownload(format, entries, baseFilename);
    if (onDownloaded) onDownloaded(format, entries.length);
  };

  const cloudCopy = {
    gdocs: {
      title: '📑 Open in Google Docs',
      fileType: 'Word (.docx)',
      url: 'https://docs.google.com',
      urlLabel: 'docs.google.com',
      btnLabel: 'Download for Google Docs',
    },
    gsheets: {
      title: '📈 Open in Google Sheets',
      fileType: 'Excel (.xlsx)',
      url: 'https://sheets.google.com',
      urlLabel: 'sheets.google.com',
      btnLabel: 'Download for Google Sheets',
    },
  };

  return (
    <div className="download-menu-wrap" ref={wrapRef}>
      <button className={buttonClass || 'btn-teal'} onClick={() => setOpen(o => !o)} disabled={disabled}>
        {label} <span style={{fontSize:9,marginLeft:2}}>▾</span>
      </button>
      {open && (
        <div className="download-menu">
          {DOWNLOAD_FORMAT_GROUPS.map((group, gi) => (
            <div key={group.label}>
              {gi > 0 && <div className="download-menu-divider" />}
              <div className="download-menu-section-label">{group.label}</div>
              {Object.entries(group.formats).map(([key, fmt]) => (
                <button key={key} className="download-menu-item" onClick={() => handlePick(key)}>
                  <span>{fmt.icon}</span><span>{fmt.label}</span>
                </button>
              ))}
            </div>
          ))}
        </div>
      )}
      {cloudNote && (
        <div className="dialog-overlay" onClick={() => setCloudNote(null)}>
          <div className="dialog" style={{maxWidth:420}} onClick={e => e.stopPropagation()}>
            <div className="dialog-title">{cloudCopy[cloudNote].title}</div>
            <div className="dialog-desc">
              {cloudNote === 'gdocs' ? 'Google Docs' : 'Google Sheets'} doesn't allow files to be created directly in your Drive from outside apps without a Google sign-in connection. Here's the fastest path instead:
            </div>
            <ol style={{fontSize:12.5,color:'var(--text-secondary)',lineHeight:1.8,paddingLeft:18,marginBottom:18}}>
              <li>We'll download a {cloudCopy[cloudNote].fileType} file, formatted and ready to go</li>
              <li>Go to <a href={cloudCopy[cloudNote].url} target="_blank" rel="noopener" style={{color:'var(--teal)'}}>{cloudCopy[cloudNote].urlLabel}</a> → File → Open → Upload</li>
              <li>Select the downloaded file — it converts automatically</li>
            </ol>
            <div className="dialog-actions">
              <button className="btn-ghost" onClick={() => setCloudNote(null)}>Cancel</button>
              <button className="btn-teal" onClick={confirmCloudDownload}>{cloudCopy[cloudNote].btnLabel}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      </div>

      {selectMode && (
        <div className="select-mode-bar">

            <span className="select-mode-count">{selectedCount} of {portfolio.length} selected</span>

            <button className="btn-ghost" onClick={deselectAll}>Deselect All</button>

          <div className="select-mode-bar-right">
            <button className="btn-ghost" onClick={exitSelectMode}>Cancel</button>
            <DownloadMenu
              label={`⬇ Download Selected ${selectedCount > 0 ? `(${selectedCount})` : ''}`}
              getEntries={() => portfolio.filter(e => selectedIds[e.id])}
              baseFilename="StoryReady_SelectedStories"

        </div>

                  <div className={`portfolio-card-body ${expanded[entry.id] ? 'open' : ''}`}>

                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {confirmClear && (
        <ConfirmDialog
          title="Clear entire portfolio?"
          desc="This will permanently delete all saved stories. This cannot be undone."
          confirmLabel="Clear All"
          onConfirm={handleClearAll}
          onCancel={() => setConfirmClear(false)}
          danger
        />
      )}
      <Toast msg={toast} />
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing'); // landing | app | portfolio
  const [previousScreen, setPreviousScreen] = useState('landing');
  const [step, setStep] = useState('question');
  const [selectedQ, setSelectedQ] = useState('');
  const [customQ, setCustomQ] = useState('');
  const [sessionKey, setSessionKey] = useState(null); // stable cache key for the active in-progress story
  const [inProgressMap, setInProgressMap] = useState(() => loadAllSessions()); // key -> { status, lastUpdated, ... } for question list indicators
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const [isProcessing, setIsProcessing] = useState(false);
  const [output, setOutput] = useState(null);
  const [conversationHistory, setConversationHistory] = useState([]);
  const [progress, setProgress] = useState(0);
  const [portfolio, setPortfolio] = useState(loadPortfolio);
  const [outputSavedId, setOutputSavedId] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [toast, setToast] = useState(null);
  const [apiKey, setApiKey] = useState(loadApiKey);
  const [selectedModel, setSelectedModel] = useState(loadSelectedModel);
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const [retryAvailable, setRetryAvailable] = useState(null);
  const [outputUsage, setOutputUsage] = useState(null);
  const [outputModel, setOutputModel] = useState(null);
  const [sessionCost, setSessionCost] = useState(0);
  const coachingCostThisStory = useRef(0);
  const [pendingAction, setPendingAction] = useState(null); // stores what to do after key is provided
  const messagesEndRef = useRef(null);

  const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); }, []);
  const finalQuestion = selectedQ === "Custom question (I'll type it in)" ? customQ : selectedQ;

  const handleSaveApiKey = (key) => {
    setApiKey(key);
    saveApiKey(key);
    setShowApiKeyModal(false);
    showToast('API key saved!');
  };

  const handleSelectModel = (model) => {
    setSelectedModel(model);
    saveSelectedModel(model);
  };

  const handleClearApiKey = () => {
    setApiKey('');
    clearApiKey();
    showToast('API key removed.');
  };

  const requireApiKey = () => {
    if (!apiKey) { setShowApiKeyModal(true); return false; }
    return true;
  };

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

  // ── Auto-persist the active story's progress as it evolves, not just on navigation ──
  useEffect(() => {
    if (!sessionKey) return;
    const status = step === 'done' ? 'completed' : 'in_progress';
    saveSessionFor(sessionKey, {
      status, step, selectedQ, customQ, messages, conversationHistory, output, progress,
      outputSavedId, outputUsage, outputModel,
    });
    setInProgressMap(prev => ({ ...prev, [sessionKey]: { status, lastUpdated: new Date().toISOString() } }));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [sessionKey, step, messages, output, outputSavedId]);

  // ── Refresh the in-progress/completed indicator map from storage ──
  const refreshInProgressMap = useCallback(() => {
    setInProgressMap(loadAllSessions());
  }, []);

  // ── Cache the current in-flight story under its own key ──
  const cacheSession = useCallback(() => {
    if (!sessionKey) return; // nothing started yet — nothing to cache
    const status = step === 'done' ? 'completed' : 'in_progress';
    saveSessionFor(sessionKey, {
      status, step, selectedQ, customQ, messages, conversationHistory, output, progress,
      outputSavedId, outputUsage, outputModel,
    });
    refreshInProgressMap();
  }, [sessionKey, step, selectedQ, customQ, messages, conversationHistory, output, progress, outputSavedId, outputUsage, outputModel, refreshInProgressMap]);

  // ── Resume a specific question's saved session ──
  const resumeSession = useCallback((key) => {
    const cache = loadSessionFor(key);
    if (!cache) return false;
    setSessionKey(key);
    setStep(cache.step || 'question');
    setSelectedQ(cache.selectedQ || '');
    setCustomQ(cache.customQ || '');
    setMessages(cache.messages || []);
    setConversationHistory(cache.conversationHistory || []);
    setOutput(cache.output || null);
    setProgress(cache.progress || 0);
    setOutputSavedId(cache.outputSavedId || null);
    setOutputUsage(cache.outputUsage || null);
    setOutputModel(cache.outputModel || null);
    coachingCostThisStory.current = 0;
    return true;
  }, []);

  // ── Begin a brand-new session for a question with no prior progress ──
  const beginFreshSession = (key) => {
    setSessionKey(key);
    setStep('question');
    setMessages([]);
    setConversationHistory([]);
    setOutput(null);
    setProgress(10);
    setOutputSavedId(null);
    setOutputUsage(null);
    setOutputModel(null);
    setRetryAvailable(null);
    coachingCostThisStory.current = 0;
  };

  const goToLanding = () => { cacheSession(); setScreen('landing'); };
  const goToPortfolio = (from) => { cacheSession(); setPreviousScreen(from || screen); refreshInProgressMap(); setScreen('portfolio'); };
  const goBackFromPortfolio = () => {
    if (previousScreen === 'app' && sessionKey) { resumeSession(sessionKey); setScreen('app'); }
    else setScreen('landing');
  };
  // "Continue Building Stories" from the Portfolio page — always lands on question selection
  // so the user can see all their in-progress/completed indicators and pick where to go next.
  const goToQuestionSelection = () => {
    setSessionKey(null);
    setStep('question');
    setSelectedQ(''); setCustomQ('');
    setMessages([{ role:'ai', content:"Welcome back! 👋 Pick up where you left off, or start a new story." }]);
    setConversationHistory([]); setOutput(null); setProgress(10);
    setOutputSavedId(null); setOutputUsage(null); setOutputModel(null); setRetryAvailable(null);
    coachingCostThisStory.current = 0;
    refreshInProgressMap();
    setScreen('app');
    if (!apiKey) setShowApiKeyModal(true);
  };
  const goToApp = () => {
    // Returning to the app from the landing page resumes whatever was last active, if anything.
    const restored = sessionKey ? resumeSession(sessionKey) : false;
    if (!restored) {
      setSessionKey(null);
      setStep('question');
      setMessages([{ role:'ai', content:"Welcome to StoryReady! 👋 Choose a question to get started." }]);
      setProgress(10);
    }
    refreshInProgressMap();
    setScreen('app');
    if (!apiKey) setShowApiKeyModal(true);
  };

  const addMessage = (role, content) => setMessages(prev => [...prev, { role, content }]);

  // Stable key for a preset question is the question text itself. Custom questions get
  // a generated id so two different custom entries (or edits) never collide.
  const makeCustomKey = () => `custom:${Date.now()}`;

  const handleQuestionSelect = (q) => {
    setSelectedQ(q);
    if (q === "Custom question (I'll type it in)") return; // wait for the text input + Go button

    const existing = inProgressMap[q];
    if (existing) {
      resumeSession(q);
      setMessages(prev => {
        const already = existing.messages || [];
        return already.length ? already : prev;
      });
      return;
    }

    beginFreshSession(q);
    setStep('story'); setProgress(25);
    setMessages([
      { role:'user', content: q },
      { role:'ai', content: `Great choice. Share your story — as rough as it is. Tell me what happened, what you did, and what the outcome was.` }
    ]);
  };

  const handleCustomQSubmit = () => {
    if (!customQ.trim()) return;
    const key = makeCustomKey();
    beginFreshSession(key);
    setSelectedQ("Custom question (I'll type it in)");
    setStep('story'); setProgress(25);
    setMessages([
      { role:'user', content: customQ },
      { role:'ai', content: `Perfect. Share your story — as rough or polished as it is. Tell me what happened, what you did, and what the outcome was.` }
    ]);
  };

  const processStory = async (fullHistory, storyText) => {
    setIsProcessing(true); setProgress(80);
    try {
      const prompt = `Interview Question: "${finalQuestion}"\n\nUser's story:\n${storyText}`;
      const { text: result, usage } = await callClaude([{ role:'user', content: prompt }], REFINE_PROMPT, apiKey, 4096, selectedModel);
      let parsed;
      try {
        parsed = JSON.parse(result);
      } catch {
        try { parsed = tryRepairJson(result); }
        catch { throw new Error('PARSE_FAILED'); }
      }
      const storyCost = estimateCost(usage, selectedModel) + coachingCostThisStory.current;
      setOutput(parsed); setOutputUsage(usage); setOutputModel(selectedModel); setProgress(100); setStep('done'); setRetryAvailable(null);
      setSessionCost(prev => prev + storyCost);
      coachingCostThisStory.current = 0;
      addMessage('ai', "Your story is ready! 🎉 Check the output panel — you can copy, download, or save it to your portfolio.");
    } catch (err) {
      setProgress(70);
      if (err.message === 'NO_API_KEY') {
        setShowApiKeyModal(true);
      } else if (err.message === 'INVALID_API_KEY') {
        addMessage('ai', "That API key was rejected by Anthropic. Please check it and try again.");
        setApiKey(''); clearApiKey(); setShowApiKeyModal(true);
      } else if (err.message === 'TRUNCATED_RESPONSE' || err.message === 'PARSE_FAILED') {
        addMessage('ai', "The response got cut off before it finished generating — this can happen with longer or more detailed stories. Click 'Retry' below to try again.");
        setRetryAvailable({ fullHistory, storyText });
      } else {
        addMessage('ai', `Something went wrong: ${err.message}. Click 'Retry' below to try again.`);
        setRetryAvailable({ fullHistory, storyText });
      }
    } finally { setIsProcessing(false); }
  };

  const handleRetry = () => {
    if (!retryAvailable) return;
    const { fullHistory, storyText } = retryAvailable;
    setRetryAvailable(null);
    processStory(fullHistory, storyText);
  };

  const handleSend = async () => {
    const text = input.trim();
    if (!text || isTyping || isProcessing) return;
    if (!requireApiKey()) return;
    setInput('');
    addMessage('user', text);
    const newHistory = [...conversationHistory, { role:'user', content: text }];
    setConversationHistory(newHistory);
    if (step === 'story') { setStep('coaching'); setProgress(50); }
    setIsTyping(true);
    try {
      const coachMessages = newHistory.map(m => ({ role: m.role==='ai'?'assistant':'user', content: m.content }));
      const { text: resp, usage } = await callClaude(coachMessages, CHAT_PROMPT, apiKey, 1000, selectedModel);
      const turnCost = estimateCost(usage, selectedModel);
      setIsTyping(false);
      if (resp.includes('READY_TO_PROCESS')) {
        const clean = resp.replace('READY_TO_PROCESS','').trim();
        if (clean) addMessage('ai', clean);
        setProgress(70);
        coachingCostThisStory.current += turnCost;
        await processStory(newHistory, newHistory.filter(m=>m.role==='user').map(m=>m.content).join('\n\n'));
      } else {
        addMessage('ai', resp);
        setConversationHistory([...newHistory, { role:'ai', content: resp }]);
        coachingCostThisStory.current += turnCost;
        setSessionCost(prev => prev + turnCost);
      }
    } catch (err) {
      setIsTyping(false);
      if (err.message === 'NO_API_KEY') { setShowApiKeyModal(true); }
      else if (err.message === 'INVALID_API_KEY') { addMessage('ai', "That API key was rejected by Anthropic. Please check it and try again."); setApiKey(''); clearApiKey(); setShowApiKeyModal(true); }
      else addMessage('ai', "Something went wrong. Please try again.");
    }
  };

  const handleKeyDown = (e) => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

  const doReset = () => {
    setConfirmReset(false);
    if (sessionKey) deleteSessionFor(sessionKey);
    setSessionKey(null);
    setStep('question'); setSelectedQ(''); setCustomQ('');
    setMessages([{ role:'ai', content:"Session reset. Choose a new question to get started." }]);
    setInput(''); setOutput(null); setConversationHistory([]); setProgress(10); setIsProcessing(false); setOutputSavedId(null); setRetryAvailable(null);
    setOutputUsage(null); setOutputModel(null); coachingCostThisStory.current = 0;
    refreshInProgressMap();
  };

  const saveToPortfolio = () => {
    if (!output) return;
    const cost = estimateCost(outputUsage, outputModel);
    const entry = {
      id: Date.now().toString(),
      question: finalQuestion,
      output,
      savedAt: new Date().toISOString(),
      usage: outputUsage,
      model: outputModel,
      cost,
    };
    const updated = [...portfolio, entry];
    setPortfolio(updated); savePortfolio(updated);
    setOutputSavedId(entry.id);
    showToast('Saved to portfolio!');
  };

  const deleteFromPortfolio = (id) => {
    const updated = portfolio.filter(e => e.id !== id);
    setPortfolio(updated); savePortfolio(updated);
  };

  const inputDisabled = isTyping || isProcessing || step === 'done' || step === 'question';
  const stepLabel = { question:'Step 1: Choose Question', story:'Step 2: Share Your Story', coaching:'Step 3: Coaching', done:'✓ Complete' };
  const stepClass = step === 'done' ? 'done' : (step === 'coaching' || step === 'story') ? 'active' : '';

  // ── SCREENS ──
  if (screen === 'landing') return (
    <LandingPage onStart={goToQuestionSelection} onViewPortfolio={() => goToPortfolio('landing')} portfolioCount={portfolio.length} />
  );

  if (screen === 'portfolio') return (
    <PortfolioScreen portfolio={portfolio} onBack={goBackFromPortfolio} onGoHome={goToLanding} onDeleteEntry={deleteFromPortfolio} onContinueBuilding={goToQuestionSelection} />
  );

  // APP SCREEN
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
      <div className="app-layout" style={{flex:1,overflow:'hidden'}}>
        {/* CHAT */}
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-header-left">
              <div className="logo-mark">S</div>
              <span className="logo-text">Story<span>Ready</span></span>
            </div>
            <div className="header-actions">
              <span className={`step-pill ${stepClass}`}>{stepLabel[step]}</span>
              {sessionCost > 0 && (
                <span className="cost-pill" title="Estimated total API cost this session">💰 {formatCost(sessionCost)}</span>
              )}
              <button className="btn-ghost" onClick={() => setShowApiKeyModal(true)} title="Manage API key & model">
                {apiKey ? `🔑 ${MODEL_PRICING[selectedModel].label}` : '🔑 Connect Key'}
              </button>
              <button className="btn-ghost" onClick={goToLanding} title="Back to home">⌂ Home</button>
              <button className="btn-ghost" onClick={() => goToPortfolio('app')} title="View portfolio">📚 {portfolio.length > 0 ? `(${portfolio.length})` : ''}</button>
              <button className="btn-danger" onClick={() => setConfirmReset(true)} title="Reset session">↺ Reset</button>
            </div>
          </div>

          <div className="chat-messages">
            {messages.map((m, i) => (
              <div key={i} className="msg">
                <div className={`msg-avatar ${m.role}`}>{m.role==='ai'?'SR':'You'}</div>
                <div className={`msg-bubble ${m.role}`}>{m.content}</div>
              </div>
            ))}

            {step === 'question' && (
              <div style={{animation:'fadeUp 0.3s ease'}}>
                <div className="question-grid">
                  {INTERVIEW_QUESTIONS.map((q, i) => {
                    const session = inProgressMap[q];
                    return (
                      <button key={i} className={`question-btn ${selectedQ===q?'selected':''} ${session ? 'has-progress' : ''}`} onClick={() => handleQuestionSelect(q)}>
                        <span className="question-btn-text">{q}</span>
                        {session && (
                          <span className={`question-status-badge ${session.status === 'completed' ? 'status-completed' : 'status-in-progress'}`}>
                            {session.status === 'completed' ? '✓ Completed' : '● In Progress'}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>

                {Object.keys(inProgressMap).some(k => k.startsWith('custom:')) && (
                  <div style={{marginTop:14}}>
                    <div className="custom-sessions-label">Your custom questions</div>
                    <div className="question-grid">
                      {Object.entries(inProgressMap)
                        .filter(([k]) => k.startsWith('custom:'))
                        .sort((a,b) => new Date(b[1].lastUpdated||0) - new Date(a[1].lastUpdated||0))
                        .map(([key, session]) => {
                          const cached = loadSessionFor(key);
                          const label = cached?.customQ || cached?.selectedQ || 'Custom question';
                          return (
                            <button key={key} className={`question-btn has-progress ${sessionKey===key?'selected':''}`} onClick={() => resumeSession(key)}>
                              <span className="question-btn-text">{label}</span>
                              <span className={`question-status-badge ${session.status === 'completed' ? 'status-completed' : 'status-in-progress'}`}>
                                {session.status === 'completed' ? '✓ Completed' : '● In Progress'}
                              </span>
                            </button>
                          );
                        })}
                    </div>
                  </div>
                )}

                <div style={{marginTop:14}}>
                  <button
                    className={`question-btn ${selectedQ==="Custom question (I'll type it in)"?'selected':''}`}
                    onClick={() => handleQuestionSelect("Custom question (I'll type it in)")}
                  >
                    <span className="question-btn-text">✏️ Custom question (I'll type it in)</span>
                  </button>
                </div>

                {selectedQ === "Custom question (I'll type it in)" && (
                  <div style={{marginTop:'12px',display:'flex',gap:'8px'}}>
                    <input type="text" value={customQ} onChange={e=>setCustomQ(e.target.value)}
                      placeholder="Type your interview question..."
                      style={{flex:1,background:'var(--navy-light)',border:'1px solid var(--border-light)',borderRadius:'8px',padding:'10px 14px',fontSize:'13px',color:'var(--text-primary)',fontFamily:'Inter,sans-serif'}}
                      onKeyDown={e=>e.key==='Enter'&&handleCustomQSubmit()} />
                    <button className="btn-primary" style={{padding:'10px 16px',fontSize:'13px'}} onClick={handleCustomQSubmit}>Go</button>
                  </div>
                )}
              </div>
            )}

            {isTyping && <TypingIndicator />}
            <div ref={messagesEndRef} />
          </div>

          {retryAvailable && !isProcessing && (
            <div className="retry-banner">
              <span>⚠️ Story generation didn't complete.</span>
              <button className="btn-teal" onClick={handleRetry}>↻ Retry</button>
            </div>
          )}

          <div className="chat-input-area">
            <div className="chat-input-wrap">
              <textarea className="chat-textarea" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKeyDown}
                placeholder={step==='question'?'Select a question above...':step==='done'?'Story complete — reset or go home to start a new one.':step==='story'?'Share your story here — as rough as you want...':'Continue the conversation...'}
                disabled={inputDisabled} rows={2} />
              <button className="send-btn" onClick={handleSend} disabled={inputDisabled||!input.trim()}>↑</button>
            </div>
            <div className="chat-hint">Enter to send · Shift+Enter for new line</div>
          </div>
        </div>

        {/* OUTPUT */}
        <OutputPanel output={output} question={finalQuestion} isProcessing={isProcessing}
          onSaveToPortfolio={saveToPortfolio} alreadySaved={!!outputSavedId}
          usage={outputUsage} storyCost={estimateCost(outputUsage, outputModel)} model={outputModel} />
      </div>

      {confirmReset && (
        <ConfirmDialog title="Reset this session?" desc="Your current coaching conversation and story output will be cleared. Anything already saved to your portfolio will be kept."
          confirmLabel="Reset Session" onConfirm={doReset} onCancel={() => setConfirmReset(false)} danger />
      )}
      {showApiKeyModal && (
        <ApiKeyModal existingKey={apiKey} onSave={handleSaveApiKey} onCancel={() => setShowApiKeyModal(false)}
          selectedModel={selectedModel} onSelectModel={handleSelectModel} />
      )}
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
